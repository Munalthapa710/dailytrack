services:
  - type: web
    name: dailytrack-web
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.6
      - key: DATABASE_URL
        fromDatabase:
          name: dailytrack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: dailytrack-db
    plan: free
    region: oregon
