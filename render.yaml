services:
  - type: web
    name: dailytrack-web
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
