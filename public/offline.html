<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>DailyRoutine Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f8fc;
        color: #0f172a;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 2rem));
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: white;
        padding: 2rem;
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
      }

      span {
        color: #0f766e;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.6rem 0;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Offline mode</span>
      <h1>DailyRoutine is offline</h1>
      <p>Reconnect to create, update, or delete tasks. Previously cached screens can still open from the installed app.</p>
    </main>
  </body>
</html>
